services:
  xray:
    image: ${XRAY_IMAGE:-ghcr.io/xtls/xray-core:26.4.17}
    container_name: xray
    restart: always
    user: "0:0"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    expose:
      - "10443"
      - "10444"
      - "10085"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./certs:/etc/xray/certs:ro
      - ./logs/xray:/var/log/xray
    command: ["run", "-c", "/etc/xray/config.json"]
    networks:
      - vless-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085", "-pattern", ""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.29.8-alpine}
    container_name: nginx-edge
    restart: always
    ports:
      - "443:443"
    expose:
      - "8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        conf=/etc/nginx/nginx.conf
        if [ -f /etc/nginx/modules/ngx_stream_module.so ]; then
          sed '1iload_module modules/ngx_stream_module.so;' "$$conf" > /tmp/nginx.conf
          conf=/tmp/nginx.conf
        elif [ -f /usr/lib/nginx/modules/ngx_stream_module.so ]; then
          sed '1iload_module /usr/lib/nginx/modules/ngx_stream_module.so;' "$$conf" > /tmp/nginx.conf
          conf=/tmp/nginx.conf
        fi
        exec nginx -c "$$conf" -g 'daemon off;'
    networks:
      - vless-net
    depends_on:
      xray:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vless-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
