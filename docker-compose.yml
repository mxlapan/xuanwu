services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./certs:/etc/xray/certs:ro
      - ./logs/xray:/var/log/xray
    command: ["run", "-c", "/etc/xray/config.json"]
    networks:
      - vless-net
    depends_on:
      nginx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085", "-pattern", ""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: nginx-fallback
    restart: always
    expose:
      - "8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - vless-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vless-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
