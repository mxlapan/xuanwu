name: CI

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: gofmt
        run: test -z "$(gofmt -l cmd internal)"

  shell-and-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: bash -n deploy.sh
      - name: ShellCheck
        run: shellcheck -S error deploy.sh
      - name: Panel compose config
        env:
          PANEL_ADMIN_PASS: ci-placeholder
        run: docker compose -f deploy/panel/docker-compose.yml config --quiet
      - name: Node compose config
        env:
          REALITY_SERVER_NAME: example.com
          DOMAIN: example.com
        run: docker compose -f deploy/node/docker-compose.yml config --quiet
