<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>玄武 Xuanwu — Control Panel</title>
<style>
  :root {
    --bg:#0a0e17; --bg2:#0e131f; --panel:#131a29; --panel2:#18202f;
    --line:#212a3d; --line2:#2c3750; --fg:#eef2fb; --mut:#9aa7c2; --mut2:#68748e;
    --acc:#6d8bff; --acc2:#93a6ff; --grad:linear-gradient(135deg,#6366f1,#8b5cf6);
    --ok:#3ddc97; --bad:#ff6b7d; --warn:#f7b955;
    --shadow:0 10px 34px rgba(0,0,0,.4); --shadow-sm:0 2px 10px rgba(0,0,0,.25);
    --r:14px; --r-sm:9px;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; color:var(--fg);
    font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(900px 500px at 88% -8%, rgba(109,139,255,.10), transparent 55%),
      radial-gradient(700px 500px at 0% 100%, rgba(139,92,246,.08), transparent 55%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
  }
  a { color:var(--acc2); text-decoration:none; }
  svg { display:block; }
  .ico { width:18px; height:18px; stroke:currentColor; stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round; flex:none; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:var(--line2); border-radius:8px; border:2px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:#3a4766; background-clip:padding-box; }

  /* ---------- layout ---------- */
  .layout { display:grid; grid-template-columns:236px 1fr; min-height:100vh; }
  aside {
    background:linear-gradient(180deg, rgba(20,27,42,.7), rgba(10,14,23,.7));
    border-right:1px solid var(--line); padding:16px 14px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:0; height:100vh;
  }
  .brand { display:flex; align-items:center; gap:11px; padding:6px 8px 18px; }
  .brand .logo { width:38px; height:38px; border-radius:11px; background:var(--grad); display:grid; place-items:center; font-size:20px; color:#fff; box-shadow:0 6px 18px rgba(99,102,241,.4); }
  .brand b { font-size:15px; letter-spacing:.01em; } .brand span { display:block; font-size:11px; color:var(--mut2); margin-top:1px; }
  .navlabel { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--mut2); padding:10px 10px 5px; font-weight:600; }
  .navbtn { display:flex; align-items:center; gap:11px; width:100%; text-align:left; padding:9px 11px; border-radius:10px; border:1px solid transparent; background:transparent; color:var(--mut); cursor:pointer; font:inherit; font-weight:500; transition:.14s; }
  .navbtn .ico { width:17px; height:17px; opacity:.85; }
  .navbtn:hover { background:var(--panel); color:var(--fg); }
  .navbtn.active { background:var(--panel2); color:var(--fg); border-color:var(--line2); box-shadow:var(--shadow-sm); }
  .navbtn.active .ico { color:var(--acc2); opacity:1; }
  aside .grow { flex:1; }
  .who { padding:11px 12px; margin-top:6px; border-top:1px solid var(--line); color:var(--mut2); font-size:11px; }
  .who b { color:var(--fg); display:block; font-size:13px; margin-top:2px; font-weight:600; }

  main { padding:26px 32px 60px; max-width:1220px; width:100%; margin:0 auto; }
  .bar { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; gap:14px; }
  .bar h2 { margin:0; font-size:22px; font-weight:680; letter-spacing:-.02em; }
  .bar .sub { color:var(--mut); font-size:13px; margin-top:3px; }

  /* ---------- buttons ---------- */
  button { font:inherit; cursor:pointer; border:1px solid var(--line2); background:var(--panel2); color:var(--fg); border-radius:var(--r-sm); padding:8px 13px; transition:.14s; display:inline-flex; align-items:center; gap:7px; }
  button:hover { border-color:var(--acc); background:var(--panel); }
  button:active { transform:translateY(1px); }
  button .ico { width:16px; height:16px; }
  button.primary { background:var(--grad); border-color:transparent; color:#fff; font-weight:600; box-shadow:0 4px 14px rgba(99,102,241,.35); }
  button.primary:hover { filter:brightness(1.08); border-color:transparent; }
  button.ghost { background:transparent; }
  button.danger { color:var(--bad); border-color:transparent; background:transparent; }
  button.danger:hover { background:rgba(255,107,125,.12); border-color:transparent; }
  button.sm { padding:6px 10px; font-size:12.5px; border-radius:8px; }
  /* compact square icon buttons for table row actions */
  .iconbtn { padding:7px; border-radius:8px; background:transparent; border:1px solid transparent; color:var(--mut); }
  .iconbtn:hover { background:var(--panel2); border-color:var(--line2); color:var(--fg); }
  .iconbtn.danger:hover { background:rgba(255,107,125,.14); color:var(--bad); }
  .iconbtn .ico { width:16px; height:16px; }
  .rowacts { display:inline-flex; gap:3px; justify-content:flex-end; }

  /* ---------- stat cards ---------- */
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:15px; margin-bottom:26px; }
  .stat { position:relative; background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line); border-radius:var(--r); padding:17px 18px; box-shadow:var(--shadow-sm); transition:.16s; overflow:hidden; }
  .stat:hover { transform:translateY(-2px); border-color:var(--line2); box-shadow:var(--shadow); }
  .stat::before { content:""; position:absolute; inset:0 0 auto 0; height:2px; background:var(--accent,var(--acc)); opacity:.7; }
  .stat .k { color:var(--mut); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; display:flex; align-items:center; gap:9px; font-weight:600; }
  .stat .v { font-size:29px; font-weight:730; margin-top:10px; letter-spacing:-.03em; line-height:1; }
  .stat .v small { font-size:13.5px; color:var(--mut); font-weight:500; letter-spacing:0; }
  .stat .foot { color:var(--mut2); font-size:12px; margin-top:8px; }
  .stat .chip { width:30px; height:30px; border-radius:9px; display:grid; place-items:center; }
  .stat .chip .ico { width:17px; height:17px; }
  .chip.blue { background:rgba(109,139,255,.16); color:#9db0ff; } .stat.blue { --accent:#6d8bff; }
  .chip.green { background:rgba(61,220,151,.15); color:var(--ok); } .stat.green { --accent:var(--ok); }
  .chip.violet { background:rgba(139,92,246,.17); color:#b79bff; } .stat.violet { --accent:#8b5cf6; }
  .chip.amber { background:rgba(247,185,85,.15); color:var(--warn); } .stat.amber { --accent:var(--warn); }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:var(--r); overflow:hidden; box-shadow:var(--shadow-sm); }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:900px){ .grid2 { grid-template-columns:1fr; } }
  .sectlabel { color:var(--mut); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin:0 2px 10px; }

  /* ---------- table ---------- */
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:13px 16px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { color:var(--mut2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.055em; background:rgba(255,255,255,.015); }
  tbody tr { transition:background .12s; }
  tbody tr:hover { background:var(--panel2); }
  tr:last-child td { border-bottom:none; }
  td.actions-cell { text-align:right; white-space:nowrap; width:1%; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:12px; color:var(--mut); }

  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; vertical-align:middle; }
  .dot.on { background:var(--ok); box-shadow:0 0 0 3px rgba(61,220,151,.16); } .dot.off { background:var(--mut2); }
  .pill { font-size:11.5px; padding:3px 10px; border-radius:20px; border:1px solid var(--line2); color:var(--mut); display:inline-flex; align-items:center; gap:5px; font-weight:500; }
  .pill.on { color:var(--ok); border-color:rgba(61,220,151,.35); background:rgba(61,220,151,.09); }
  .pill.off { color:var(--bad); border-color:rgba(255,107,125,.35); background:rgba(255,107,125,.09); }
  .pill.warn { color:var(--warn); border-color:rgba(247,185,85,.35); background:rgba(247,185,85,.09); }
  .tag { font-size:11.5px; padding:2px 9px; border-radius:7px; background:var(--panel2); border:1px solid var(--line2); color:var(--mut); margin:0 4px 4px 0; display:inline-block; }

  /* ---------- progress ---------- */
  .prog { height:6px; border-radius:6px; background:var(--line); overflow:hidden; margin-top:6px; min-width:120px; }
  .prog > i { display:block; height:100%; border-radius:6px; background:var(--grad); transition:width .3s; }
  .prog.warn > i { background:linear-gradient(90deg,var(--warn),#ff8a3d); }
  .prog.bad > i { background:linear-gradient(90deg,var(--bad),#ff3d6a); }

  /* ---------- forms / modal ---------- */
  input,select,textarea { font:inherit; background:var(--bg2); color:var(--fg); border:1px solid var(--line2); border-radius:var(--r-sm); padding:9px 12px; width:100%; transition:.14s; }
  input:focus,textarea:focus,select:focus { outline:none; border-color:var(--acc); box-shadow:0 0 0 3px rgba(109,139,255,.18); }
  input:disabled { color:var(--mut); opacity:.7; }
  label { display:block; font-size:12px; color:var(--mut); margin:13px 0 5px; font-weight:500; }
  .modal-bg { position:fixed; inset:0; background:rgba(5,8,16,.62); backdrop-filter:blur(4px); display:flex; align-items:flex-start; justify-content:center; padding:52px 16px; overflow:auto; z-index:50; animation:fade .15s; }
  @keyframes fade { from { opacity:0; } }
  .modal { background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line2); border-radius:18px; padding:24px; width:100%; max-width:480px; box-shadow:0 30px 80px rgba(0,0,0,.55); animation:rise .18s cubic-bezier(.2,.8,.2,1); }
  @keyframes rise { from { opacity:0; transform:translateY(10px); } }
  .modal h3 { margin:0 0 4px; font-size:18px; letter-spacing:-.01em; }
  .modal .hint { color:var(--mut2); font-size:12.5px; margin:0 0 10px; }
  .row { display:flex; gap:12px; } .row > div { flex:1; }
  .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
  .checks { max-height:170px; overflow:auto; border:1px solid var(--line2); border-radius:10px; padding:8px; background:var(--bg2); }
  .checks label { display:flex; align-items:center; gap:9px; margin:2px 0; color:var(--fg); cursor:pointer; padding:5px 6px; border-radius:7px; }
  .checks label:hover { background:var(--panel2); }
  .checks input { width:auto; }
  .field { background:var(--bg2); border:1px solid var(--line); border-radius:var(--r-sm); padding:9px 11px; display:flex; align-items:center; gap:8px; }
  .field code { flex:1; background:none; padding:0; word-break:break-all; font-size:12.5px; }
  .mut { color:var(--mut); }
  code { background:var(--bg2); padding:2px 6px; border-radius:5px; word-break:break-all; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; }

  /* ---------- login ---------- */
  .login-wrap { min-height:100vh; display:grid; place-items:center; padding:20px; }
  .login { width:100%; max-width:380px; }
  .login .brand { justify-content:center; padding-bottom:22px; }
  .login .modal { max-width:none; }

  /* ---------- misc ---------- */
  .empty { padding:52px 20px; text-align:center; color:var(--mut); }
  .empty .eico { width:46px; height:46px; margin:0 auto 12px; color:var(--mut2); opacity:.6; }
  .empty .eico .ico { width:46px; height:46px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--line2); padding:11px 18px; border-radius:11px; box-shadow:var(--shadow); z-index:80; animation:pop .2s; font-size:13.5px; display:flex; align-items:center; gap:9px; }
  @keyframes pop { from { opacity:0; transform:translate(-50%,10px); } }
  .loading { padding:44px; text-align:center; color:var(--mut2); }

  @media (max-width:760px) {
    .layout { grid-template-columns:1fr; }
    aside { position:static; height:auto; flex-direction:row; flex-wrap:wrap; align-items:center; border-right:none; border-bottom:1px solid var(--line); padding:10px 12px; }
    aside .grow, .who, .navlabel { display:none; }
    .brand { padding:4px 8px; } main { padding:18px 14px 50px; }
    .stats { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
