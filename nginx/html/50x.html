<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Temporarily Unavailable</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            color: #1f2937;
        }
        main {
            max-width: 560px;
            padding: 48px;
            text-align: center;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, .08);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 32px;
        }
        p {
            margin: 0;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <h1>Service Temporarily Unavailable</h1>
        <p>Please try again later.</p>
    </main>
</body>
</html>
