# A managed OR standalone node: nginx (SNI split) + xray + agent.
#   MODE=managed     agent connects to the panel (needs PANEL_URL + NODE_TOKEN)
#   MODE=standalone  agent manages users locally with no panel (needs REALITY_*)
services:
  xray:
    image: ${XRAY_IMAGE:-ghcr.io/xtls/xray-core:26.6.27}
    container_name: xray
    restart: always
    user: "0:0"
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    expose: ["10443", "10444", "10085"]
    volumes:
      - ./data/xray/config.json:/etc/xray/config.json
      - ./certs:/etc/xray/certs:ro
      - ./logs/xray:/var/log/xray
    command: ["run", "-c", "/etc/xray/config.json"]
    networks: [xuanwu-net]
    healthcheck:
      test: ["CMD", "xray", "api", "statsquery", "--server=127.0.0.1:10085", "-pattern", ""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    image: ${NGINX_IMAGE:-nginx:1.30.3-alpine}
    container_name: nginx-edge
    restart: always
    ports: ["443:443"]
    expose: ["8080"]
    volumes:
      - ./data/nginx:/etc/xnginx:ro        # nginx.conf is generated by the agent
      - ./nginx/html:/usr/share/nginx/html:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        CONF=/etc/xnginx/nginx.conf
        # the agent writes this (SNI routing from the panel / env); wait for it
        for i in $$(seq 1 120); do [ -f "$$CONF" ] && break; sleep 0.5; done
        RUN=/tmp/nginx.conf
        {
          if [ -f /etc/nginx/modules/ngx_stream_module.so ]; then
            echo 'load_module modules/ngx_stream_module.so;'
          elif [ -f /usr/lib/nginx/modules/ngx_stream_module.so ]; then
            echo 'load_module /usr/lib/nginx/modules/ngx_stream_module.so;'
          fi
          cat "$$CONF"
        } > "$$RUN"
        exec nginx -c "$$RUN" -g 'daemon off;'
    networks: [xuanwu-net]
    depends_on:
      xray:
        condition: service_started
      agent:
        condition: service_started

  agent:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    image: xuanwu-agent:latest
    container_name: xuanwu-agent
    restart: always
    command: ["${MODE:-managed}"]
    environment:
      MODE: ${MODE:-managed}
      # managed mode
      PANEL_URL: ${PANEL_URL:-}
      NODE_TOKEN: ${NODE_TOKEN:-}
      # standalone mode (also used by nginx above)
      REALITY_DEST: ${REALITY_DEST:-}
      REALITY_SERVER_NAME: ${REALITY_SERVER_NAME:-}
      REALITY_PRIVATE_KEY: ${REALITY_PRIVATE_KEY:-}
      REALITY_PUBLIC_KEY: ${REALITY_PUBLIC_KEY:-}
      REALITY_SHORT_ID: ${REALITY_SHORT_ID:-}
      DOMAIN: ${DOMAIN:-}
      ADDRESS: ${ADDRESS:-}
      XUANWU_USERS_FILE: /data/users.json
      # common
      XRAY_CONFIG: /etc/xray/config.json
      XRAY_CONTAINER: xray
      XRAY_GRPC: xray:10085
      XRAY_CERT: /etc/xray/certs/fullchain.pem
      XRAY_ACCESS_LOG: /var/log/xray/access.log
      STATS_INTERVAL: ${STATS_INTERVAL:-60}
    volumes:
      - ./data/xray/config.json:/etc/xray/config.json
      - ./data:/data
      - ./certs:/etc/xray/certs:ro       # watch for cert renewals
      - ./logs/xray:/var/log/xray:ro     # read access log for device tracking
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [xuanwu-net]
    depends_on:
      xray:
        condition: service_started

  # Automatic TLS via acme.sh (Let's Encrypt). Always runs and stays idle until a
  # TLS domain appears: the agent writes it (from the panel in managed mode, or
  # from DOMAIN in .env in standalone mode) to data/acme/domain — so a managed
  # node never repeats the domain in .env. Issues + renews via HTTP-01 (port 80;
  # the domain must resolve publicly to this host), writes to ./certs, and the
  # agent hot-reloads xray. ACME_EMAIL is optional (a random one is generated).
  # For hosts behind NAT/CDN, switch the issue command to a DNS-01 provider.
  acme:
    image: ${ACME_IMAGE:-neilpang/acme.sh:latest}
    container_name: xuanwu-acme
    restart: always
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-}
      ACME_SERVER: ${ACME_SERVER:-letsencrypt}
    ports: ["80:80"]   # HTTP-01 challenge
    volumes:
      - ./certs:/certs
      - ./data/acme:/acme.sh
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -u
        HOME_DIR=/acme.sh
        DOMAIN_FILE="$$HOME_DIR/domain"
        echo "acme: waiting for a TLS domain (panel/agent writes $$DOMAIN_FILE)"
        LAST=""
        while true; do
          DOMAIN=""
          [ -f "$$DOMAIN_FILE" ] && DOMAIN="$$(tr -d '[:space:]' < "$$DOMAIN_FILE" 2>/dev/null || true)"
          if [ -n "$$DOMAIN" ] && [ "$$DOMAIN" != "$$LAST" ]; then
            echo "acme: obtaining certificate for $$DOMAIN"
            EMAIL="$${ACME_EMAIL:-}"
            if [ -z "$$EMAIL" ]; then
              if [ -f "$$HOME_DIR/.xuanwu-email" ]; then
                EMAIL="$$(cat "$$HOME_DIR/.xuanwu-email")"
              else
                EMAIL="xuanwu-$$(head -c6 /dev/urandom | od -An -tx1 | tr -dc a-f0-9)@$$DOMAIN"
                echo "$$EMAIL" > "$$HOME_DIR/.xuanwu-email"
              fi
            fi
            acme.sh --home "$$HOME_DIR" --register-account -m "$$EMAIL" --server "$${ACME_SERVER:-letsencrypt}" || true
            acme.sh --home "$$HOME_DIR" --issue --standalone -d "$$DOMAIN" --server "$${ACME_SERVER:-letsencrypt}" || true
            if acme.sh --home "$$HOME_DIR" --install-cert -d "$$DOMAIN" \
                 --key-file /certs/privkey.pem \
                 --fullchain-file /certs/fullchain.pem \
                 --reloadcmd "chmod 644 /certs/fullchain.pem /certs/privkey.pem"; then
              echo "acme: certificate installed for $$DOMAIN"
              LAST="$$DOMAIN"
            else
              echo "acme: $$DOMAIN not ready yet (DNS/port 80?); will retry"
            fi
          fi
          acme.sh --home "$$HOME_DIR" --cron || true   # renew already-issued certs
          sleep 60
        done
    networks: [xuanwu-net]

networks:
  xuanwu-net:
    driver: bridge
